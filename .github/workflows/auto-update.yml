name: Docker Image CI

on:
  schedule:
    - cron: '0 3 * * *' # Starts daily at 03:00 AM
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (Force check for new version)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v5
          push: false
          load: true
          no-cache: true # Ensures curl in Dockerfile isn't cached
          tags: agh:local

      - name: Get AdGuardHome version from built image
        id: get_version
        run: |
          # Extract version from binary output
          RAW_VERSION=$(docker run --rm agh:local ./AdGuardHome --version)
          VERSION_TAG=$(echo "$RAW_VERSION" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "AGH_VERSION=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "Detected: $VERSION_TAG"

      - name: Check if version exists in GHCR
        id: check_image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO_LOWER" >> "$GITHUB_OUTPUT"
          docker manifest inspect ghcr.io/$REPO_LOWER:${{ steps.get_version.outputs.AGH_VERSION }}
        continue-on-error: true

      - name: Tag and push if new
        if: steps.check_image.outcome == 'failure'
        run: |
          REPO="ghcr.io/${{ steps.check_image.outputs.repo }}"
          VER="${{ steps.get_version.outputs.AGH_VERSION }}"
          docker tag agh:local "$REPO:latest"
          docker tag agh:local "$REPO:$VER"
          docker push "$REPO:latest"
          docker push "$REPO:$VER"
