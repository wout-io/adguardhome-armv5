name: Docker Image CI

on:
  schedule:
    - cron: '0 3 * * *' # Corrected: Runs every day at 03:00 AM UTC
  workflow_dispatch:      # Allows you to start it manually for testing
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (Force check for new version)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v5
          push: false
          load: true
          no-cache: true # CRITICAL: This forces the Dockerfile to run the 'curl' again
          tags: agh:local

      - name: Get AdGuardHome version from built image
        id: get_version
        run: |
          # Runs the binary inside the armv5 image (via QEMU) to ask its version
          RAW_VERSION=$(docker run --rm agh:local ./AdGuardHome --version)
          # Extracts the version tag (e.g., v0.107.52)
          VERSION_TAG=$(echo "$RAW_VERSION" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          
          if [ -z "$VERSION_TAG" ]; then
            echo "Error: Could not detect version from binary"
            exit 1
          fi
          
          echo "Detected AdGuardHome version: $VERSION_TAG"
          echo "AGH_VERSION=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Check if version exists in GHCR
        id: check_image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO_LOWER" >> "$GITHUB_OUTPUT"
          
          # Check if the specific version tag already exists in your registry
          docker manifest inspect ghcr.io/$REPO_LOWER:${{ steps.get_version.outputs.AGH_VERSION }} > /dev/null 2>&1
        continue-on-error: true

      - name: Tag and push image if it is new
        # Only runs if the 'inspect' command failed (meaning the version is not in GHCR yet)
        if: steps.check_image.outcome == 'failure'
        run: |
          REPO="ghcr.io/${{ steps.check_image.outputs.repo }}"
          VER="${{ steps.get_version.outputs.AGH_VERSION }}"
          
          echo "New version detected ($VER). Pushing to registry..."
          docker tag agh:local "$REPO:latest"
          docker tag agh:local "$REPO:$VER"
          
          docker push "$REPO:latest"
          docker push "$REPO:$VER"

      - name: Skip push
        if: steps.check_image.outcome == 'success'
        run: |
          echo "Version ${{ steps.get_version.outputs.AGH_VERSION }} is already up to date in GHCR. Doing nothing."
