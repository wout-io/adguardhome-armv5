name: Build and publish ARMv5 AdGuard Home

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v5
          push: false
          load: true
          no-cache: true
          tags: agh:local

      - name: Detect AdGuard version
        id: version
        run: |
          RAW_VERSION=$(docker run --rm agh:local ./AdGuardHome --version)
          VERSION_TAG=$(echo "$RAW_VERSION" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1)

          if [ -z "$VERSION_TAG" ]; then
            echo "Could not detect AdGuard version"
            exit 1
          fi

          echo "tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION_TAG"

      - name: Check if version already exists in GHCR
        id: exists
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          docker manifest inspect ghcr.io/$REPO:${{ steps.version.outputs.tag }} >/dev/null 2>&1
        continue-on-error: true

      - name: Push image to GHCR
        if: steps.exists.outcome == 'failure'
        run: |
          REPO="ghcr.io/${{ steps.exists.outputs.repo }}"
          TAG="${{ steps.version.outputs.tag }}"

          echo "New version detected: $TAG"
          docker tag agh:local "$REPO:latest"
          docker tag agh:local "$REPO:$TAG"

          docker push "$REPO:latest"
          docker push "$REPO:$TAG"

      - name: Skip push
        if: steps.exists.outcome == 'success'
        run: |
          echo "Version ${{ steps.version.outputs.tag }} already exists in GHCR."
